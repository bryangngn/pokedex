<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pokédex Pro</title>
<style>
:root {
    --bg: #0b0f14;
    --card: #161b22;
    --accent: #ff3b3b;
    --text: #e6edf3;
    --sidebar: #0d1117;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    /* Usamos dvh para que se ajuste perfectamente al navegador móvil */
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    background: var(--bg);
    border-bottom: 1px solid #30363d;
    padding: 10px;
    text-align: center;
    flex-shrink: 0;
}
header img { height: 30px; cursor: pointer; }

.hidden { display: none !important; }

/* --- HOME REGIONES --- */
.home {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    /* Margen inferior extra para que Paldea no se tape */
    padding-bottom: 80px; 
}
.region-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    width: 100%;
    max-width: 900px;
}
.region-card {
    background: var(--card);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    border: 1px solid #30363d;
}

/* --- LAYOUT APP --- */
.layout { 
    display: flex; 
    flex: 1;
    overflow: hidden;
}

.sidebar {
    width: 250px;
    background: var(--sidebar);
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
}

.sidebar-tools { padding: 10px; border-bottom: 1px solid #30363d; }
.btn-back { width: 100%; padding: 8px; margin-bottom: 8px; background: #30363d; color: white; border: none; border-radius: 4px; cursor: pointer; }
input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0b0f14; color: white; box-sizing: border-box; }

#list { flex: 1; overflow-y: auto; }
.poke-item { padding: 12px 15px; border-bottom: 1px solid #21262d; cursor: pointer; font-size: 0.95rem; }
.poke-item.active { background: #1c2128; border-left: 4px solid var(--accent); color: var(--accent); }

/* --- AJUSTES MÓVIL --- */
@media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #30363d; }
    #list { 
        display: flex; 
        overflow-x: auto; 
        white-space: nowrap; 
        padding: 5px 0;
    }
    .poke-item { display: inline-block; padding: 10px 20px; border-bottom: none; border-right: 1px solid #21262d; }
    .poke-item.active { border-left: none; border-bottom: 3px solid var(--accent); }
    
    /* Eliminar palabra "Nacional" en móvil */
    .label-nacional { display: none; }
}

/* --- FICHA POKEMON --- */
.main { 
    flex: 1; 
    display: flex; 
    justify-content: center; 
    padding: 15px; 
    overflow-y: auto;
    /* Evita que los botones se peguen al menú del móvil */
    padding-bottom: 60px; 
}
.card {
    background: var(--card);
    padding: 20px;
    border-radius: 20px;
    width: 100%;
    max-width: 450px;
    text-align: center;
    border: 1px solid #30363d;
    height: fit-content;
}
.card img { width: 160px; height: 160px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5)); }

.types { display: flex; justify-content: center; gap: 8px; margin: 15px 0; }
.types span { padding: 5px 15px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; background: #2b6cb0; text-transform: uppercase; }

.description { font-size: 0.85rem; color: #abb2bf; margin: 15px 0; line-height: 1.5; font-style: italic; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }

.section-title { font-size: 0.7rem; font-weight: bold; color: var(--accent); text-transform: uppercase; margin: 15px 0 10px; text-align: left; border-bottom: 1px solid #333; padding-bottom: 4px; }

/* Stats */
.stat-row { margin-bottom: 8px; text-align: left; }
.stat-info { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 3px; }
.bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
.fill { height: 100%; background: #4caf50; transition: width 0.8s ease; }

.nav-btns { 
    margin-top: 25px; 
    display: flex; 
    gap: 15px; 
    justify-content: center;
    padding-bottom: 10px; /* Espacio extra interno */
}
.nav-btns button { 
    padding: 12px; 
    border: none; 
    background: #30363d; 
    color: white; 
    border-radius: 8px; 
    cursor: pointer; 
    flex: 1; 
    font-weight: bold;
}
</style>
</head>
<body>

<header>
    <img src="https://archives.bulbagarden.net/media/upload/4/4b/Pok%C3%A9dex_logo.png" alt="Pokedex" onclick="goHome()">
</header>

<div id="home" class="home">
    <h2 style="margin-bottom:20px">Elige una Región</h2>
    <div class="region-grid" id="regions"></div>
</div>

<div id="app" class="layout hidden">
    <div class="sidebar">
        <div class="sidebar-tools">
            <button class="btn-back" onclick="goHome()">← Regiones</button>
            <input type="text" id="search" placeholder="Buscar..." oninput="filterList(this.value)">
        </div>
        <div id="list"></div>
    </div>
    <div class="main">
        <div id="card" class="card">Selecciona un Pokémon</div>
    </div>
</div>

<script>
const config = {
    Kanto: [1, 151], Johto: [152, 251], Hoenn: [252, 386], Sinnoh: [387, 493], 
    Teselia: [494, 649], Kalos: [650, 721], Alola: [722, 809], Galar: [810, 905], Paldea: [906, 1025]
};

const typeES = {fire:'fuego', water:'agua', grass:'planta', electric:'eléctrico', psychic:'psíquico', dragon:'dragón', ghost:'fantasma', dark:'siniestro', fairy:'hada', normal:'normal', fighting:'lucha', flying:'volador', poison:'veneno', ground:'tierra', rock:'roca', bug:'bicho', steel:'acero', ice:'hielo'};
const statES = {hp:'PS', attack:'Ataque', defense:'Defensa', 'special-attack':'At. Esp', 'special-defense':'Def. Esp', speed:'Velocidad'};

let state = { fullList: [], filtered: [], currentIndex: 0 };

// Crear regiones
Object.keys(config).forEach(name => {
    const div = document.createElement('div');
    div.className = 'region-card';
    div.innerHTML = `<h3>${name}</h3><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${config[name][0]}.png" style="width:50px">`;
    div.onclick = () => loadRegion(name);
    document.getElementById('regions').appendChild(div);
});

function formatName(name) {
    const paradox = ['iron', 'scream', 'great', 'brute', 'flutter', 'slither', 'sandy', 'roaring', 'walking', 'gouging', 'raging'];
    let parts = name.split('-');
    if (paradox.includes(parts[0]) && parts.length > 1) return (parts[0] + ' ' + parts[1]).replace(/\b\w/g, l => l.toUpperCase());
    const tech = ['species', 'normal', 'f', 'm', 'standard', 'aria', 'incarnate'];
    if (parts.length > 1 && tech.includes(parts[1])) return parts[0].replace(/\b\w/g, l => l.toUpperCase());
    return name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
}

async function loadRegion(name) {
    const [start, end] = config[name];
    document.getElementById('home').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('list').innerHTML = '<p style="padding:15px">Cargando...</p>';

    const res = await fetch(`https://pokeapi.co/api/v2/pokemon?limit=${end - start + 1}&offset=${start - 1}`);
    const data = await res.json();
    state.fullList = data.results.map((p, i) => ({ id: start + i, name: formatName(p.name) }));
    state.filtered = [...state.fullList];
    renderSidebar();
}

function renderSidebar() {
    const listEl = document.getElementById('list');
    listEl.innerHTML = '';
    state.filtered.forEach((p, index) => {
        const d = document.createElement('div');
        d.className = 'poke-item' + (state.currentIndex === index ? ' active' : '');
        d.innerHTML = p.name;
        d.onclick = () => {
            state.currentIndex = index;
            showPokemon(p.id);
            renderSidebar();
        };
        listEl.appendChild(d);
    });
}

function filterList(val) {
    state.filtered = state.fullList.filter(p => p.name.toLowerCase().includes(val.toLowerCase()));
    state.currentIndex = 0;
    renderSidebar();
}

async function showPokemon(id) {
    const cardEl = document.getElementById('card');
    cardEl.innerHTML = 'Cargando...';
    try {
        const p = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r => r.json());
        const s = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`).then(r => r.json());
        const desc = s.flavor_text_entries.find(en => en.language.name === 'es')?.flavor_text.replace(/\f/g, ' ') || "Sin descripción.";

        cardEl.innerHTML = `
            <small style="opacity:0.6"><span class="label-nacional">Nacional </span>ID: ${p.id}</small>
            <h2 style="margin:5px 0">${formatName(p.name)}</h2>
            <img src="${p.sprites.other['official-artwork'].front_default}" alt="${p.name}">
            <div class="types">${p.types.map(t => `<span>${typeES[t.type.name] || t.type.name}</span>`).join('')}</div>
            <div class="description">"${desc}"</div>
            <div class="section-title">Estadísticas</div>
            ${p.stats.map(st => `
                <div class="stat-row">
                    <div class="stat-info"><span>${statES[st.stat.name] || st.stat.name}</span><span>${st.base_stat}</span></div>
                    <div class="bar"><div class="fill" style="width:${Math.min(st.base_stat, 100)}%"></div></div>
                </div>
            `).join('')}
            <div class="nav-btns">
                <button onclick="changePoke(-1)">Anterior</button>
                <button onclick="changePoke(1)">Siguiente</button>
            </div>
        `;
    } catch(e) { cardEl.innerHTML = "Error"; }
}

function changePoke(dir) {
    let n = state.currentIndex + dir;
    if (n >= 0 && n < state.filtered.length) {
        state.currentIndex = n;
        showPokemon(state.filtered[n].id);
        renderSidebar();
        const activeItem = document.querySelector('.poke-item.active');
        if(activeItem) activeItem.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
}

function goHome() {
    document.getElementById('home').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
}
</script>
</body>
</html>
